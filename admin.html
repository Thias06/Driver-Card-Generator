<!doctype html><html lang="fr"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Ring · Admin — Season 0</title>
<link rel="stylesheet" href="/card.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:var(--fb);padding:20px}
@media(max-width:600px){body{padding:12px}}
h1{font-family:var(--ft);font-size:14px;letter-spacing:3px;margin-bottom:6px}
.sub{color:var(--muted);font-size:12px;margin-bottom:16px}
.gate{max-width:340px;margin:80px auto;background:#0e0f15;border:1px solid var(--line);border-radius:14px;padding:24px}
.gate input{width:100%;background:#070809;border:1px solid var(--line);color:#fff;border-radius:9px;padding:11px;margin:10px 0}
.btn{background:var(--brand);border:none;color:#fff;font-family:var(--ft);letter-spacing:1px;font-size:11px;padding:11px 14px;border-radius:9px;cursor:pointer}
.btn.ghost{background:#0e0f17;border:1px solid var(--violet)}
.btn.danger{background:#9a1418;border:1px solid #ff5a5f;color:#fff}
.btn[disabled]{opacity:.4;cursor:not-allowed}
.toolbar{position:sticky;top:0;z-index:5;background:#0a0b10;border:1px solid var(--line);border-radius:12px;padding:12px 14px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.toolbar label{font-size:12px;color:var(--muted);display:flex;gap:7px;align-items:center;cursor:pointer}
.toolbar .count{color:var(--cyan);font-family:var(--ft);font-size:11px;letter-spacing:1px}
.row{display:block;background:#0c0d13;border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:14px}
.sumhead{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.suminfo{flex:1 1 200px;min-width:0}
.sumtop{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sumtop b{font-size:15px;color:#fff}
.summeta{color:var(--muted);font-size:12.5px;margin-top:3px;overflow-wrap:anywhere}
.sumbtns{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.toggle{background:#0e0f17;border:1px solid var(--violet)}
.details{display:none}
.details.open{display:flex;flex-wrap:wrap;gap:14px 18px;align-items:flex-start;margin-top:16px;padding-top:16px;border-top:1px solid var(--line)}
.prevcol{flex:0 0 200px}
.main{flex:1 1 360px;min-width:0}
.chk{width:20px;height:20px;accent-color:#7a33f0;margin-top:4px}
.prevbox{width:200px;height:250px;overflow:hidden;border-radius:10px;position:relative;background:#0c0b0f}
.prevbox .cardPost{position:absolute;top:0;left:0;transform-origin:top left;transform:scale(.1852)}
.f{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
@media(max-width:520px){.f{grid-template-columns:1fr}}
.f label{font-family:var(--ft);font-size:8px;letter-spacing:1.5px;color:var(--muted);display:block;margin-bottom:4px}
.f input{width:100%;min-width:0;background:#070809;border:1px solid var(--line);color:#fff;border-radius:8px;padding:8px;font-size:13px}
.bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;align-items:center}
.bar a,.bar .email{word-break:break-all;overflow-wrap:anywhere}
.tag{font-family:var(--ft);font-size:9px;letter-spacing:1px;padding:5px 9px;border-radius:6px}
.tag.pub{background:#0c3;color:#031}.tag.hid{background:#a22;color:#fff}.tag.pend{background:#555;color:#fff}
.tag.eq{background:#15203a;color:#7fb0ff}
a{color:var(--cyan)}
</style></head><body>
<div id="gate" class="gate">
  <h1>ADMIN — THE RING</h1>
  <input id="pass" type="password" placeholder="Mot de passe admin">
  <button class="btn" id="enter" style="width:100%">ENTRER</button>
  <p id="err" style="color:#f55;font-size:11px;margin-top:8px"></p>
</div>
<div id="app" style="display:none">
  <h1>CANDIDATURES — SEASON 0</h1>
  <div class="sub" id="count"></div>
  <div class="toolbar">
    <label><input type="checkbox" id="selAll" class="chk" style="margin:0">Tout sélectionner</label>
    <span class="count" id="selCount">0 sélectionnée(s)</span>
    <span style="width:1px;height:18px;background:var(--line)"></span>
    <span style="color:var(--muted);font-size:11px">Inclure :</span>
    <label><input type="checkbox" id="optCards" checked>Cartes</label>
    <label><input type="checkbox" id="optPhotos">Photos</label>
    <label><input type="checkbox" id="optData">Données (CSV/Excel)</label>
    <button class="btn" id="dlZip" disabled>⬇ TÉLÉCHARGER LA SÉLECTION</button>
    <button class="btn danger" id="delSel" disabled>🗑 SUPPRIMER LA SÉLECTION</button>
    <span id="zipState" style="color:var(--muted);font-size:11px"></span>
  </div>
  <div id="list"></div>
</div>
<script src="/card.js"></script>
<script>
const $=id=>document.getElementById(id);
let PASS='', ROWS=[];

// Régénère la carte EN DIRECT depuis le card.css courant (même méthode qu'à l'inscription),
// pour que le téléchargement colle toujours à l'aperçu — au lieu de servir le PNG stocké.
async function fetchAsDataURL(url){
  if(!url) return '';
  try{
    const b=await (await fetch(url,{mode:'cors'})).blob();
    return await new Promise(res=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.onerror=()=>res('');fr.readAsDataURL(b);});
  }catch(e){return '';}
}
async function renderCardCanvas(D, photoUrl){
  const photoData=await fetchAsDataURL(photoUrl);
  const stage=document.createElement('div');
  stage.style.cssText='position:fixed;left:-10000px;top:0;width:1080px;height:1350px;z-index:-1';
  const card=document.createElement('div');stage.appendChild(card);document.body.appendChild(stage);
  mountPostCard(card,D,photoData);
  card.classList.add('forcanvas');
  {const _rk=card.querySelector('.rookie');if(_rk){_rk.style.paddingTop='';_rk.style.paddingBottom='';}}
  try{await document.fonts.load("italic 900 112px 'Acumin XCond'");}catch(e){}
  await (document.fonts&&document.fonts.ready);
  const img=card.querySelector('img');
  if(img&&!img.complete){await new Promise(r=>{img.onload=r;img.onerror=r;});}
  await new Promise(r=>setTimeout(r,60));
  const cv=await html2canvas(card,{width:1080,height:1350,windowWidth:1080,windowHeight:1350,scale:1,backgroundColor:'#0c0b0f',useCORS:true});
  document.body.removeChild(stage);
  return cv;
}
$('enter').onclick=load;$('pass').addEventListener('keydown',e=>{if(e.key==='Enter')load();});
async function load(){
  PASS=$('pass').value;
  const r=await fetch('/api/admin-list',{headers:{'x-admin-pass':PASS}});
  if(r.status!==200){$('err').textContent='Mot de passe invalide.';return;}
  const data=await r.json();
  if(!Array.isArray(data)){ $('err').textContent=data.error||'Erreur de chargement.'; return; }
  ROWS=data;
  $('gate').style.display='none';$('app').style.display='block';
  $('count').textContent=ROWS.length+' inscription(s)';
  $('list').innerHTML='';ROWS.forEach(render);updateSel();
}
function eqLabel(e){return e==='achat'?'ACHAT':(e==='location'?'LOCATION':'—');}
function render(row){
  const wrap=document.createElement('div');wrap.className='row';
  const D={first:row.first_name,last:row.last_name,alias:row.alias,city:row.city,nationality:row.nationality,style:row.driving_style,overall:row.overall,level:row.level,showName:row.show_name!==false};
  const st=row.hidden?'<span class="tag hid">MASQUÉE</span>':(row.status==='published'?'<span class="tag pub">PUBLIÉE</span>':'<span class="tag pend">'+esc((row.status||'').toUpperCase())+'</span>');
  const full=((row.first_name||'')+' '+(row.last_name||'')).trim();
  const validerBtn=row.status!=='published'?'<button class="btn" data-act="valider" style="background:#0c3;color:#031">✓ PUBLIER</button>':'';
  wrap.innerHTML=`
    <div class="sumhead">
      <input type="checkbox" class="chk sel" data-id="${esc(String(row.id))}" data-slug="${esc(row.slug)}" data-card="${esc(row.card_url||'')}" data-photo="${esc(row.photo_url||'')}">
      <div class="suminfo">
        <div class="sumtop"><b>${esc(row.alias||'')}</b> ${st}</div>
        <div class="summeta">${esc(full||'—')} · ${esc(row.city||'—')}</div>
      </div>
      <div class="sumbtns">
        ${validerBtn}
        <button class="btn ghost" data-act="hide">${row.hidden?'RÉAFFICHER':'MASQUER'}</button>
        <button class="btn ghost" data-act="dl-card">⬇ CARTE</button>
        <button class="btn toggle" data-act="more">Plus d'infos ▾</button>
        <button class="btn danger" data-act="del">🗑 SUPPRIMER</button>
      </div>
    </div>
    <div class="details">
      <div class="prevcol"><div class="prevbox"><div class="cardPost" id="prev-${row.id}"></div></div></div>
      <div class="main">
        <div class="f">
          <div><label>PSEUDO</label><input data-f="alias" value="${esc(row.alias)}"></div>
          <div><label>STYLE DE CONDUITE</label><input data-f="driving_style" value="${esc(row.driving_style||'')}"></div>
          <div><label>PRÉNOM</label><input data-f="first_name" value="${esc(row.first_name)}"></div>
          <div><label>NOM</label><input data-f="last_name" value="${esc(row.last_name)}"></div>
          <div><label>VILLE</label><input data-f="city" value="${esc(row.city||'')}"></div>
          <div><label>PAYS</label><input data-f="nationality" value="${esc(row.nationality||'')}"></div>
        </div>
        <div class="bar">
          <span class="tag eq">FORMULE : ${eqLabel(row.equipment)}</span><span class="tag eq">${(row.language||'fr').toUpperCase()}</span><span class="tag eq">NOM : ${row.show_name!==false?'OUI':'PSEUDO'}</span><span class="tag eq">${row.photo_type==='photo'?'PHOTO':'AVATAR'}</span>
          <button class="btn" data-act="save">ENREGISTRER LES MODIFS</button>
          ${row.slug?`<a href="/drivers/${row.slug}" target="_blank">/drivers/${row.slug}</a>`:''}
          <span class="email" style="color:var(--muted);font-size:11px">${esc(row.email||'')}</span>
        </div>
        ${row.motivation?`<div style="margin-top:10px;color:#c9cbd8;font-size:12px;line-height:1.45;background:#0a0b10;border:1px solid var(--line);border-radius:9px;padding:10px"><b style="color:var(--muted);font-family:var(--ft);font-size:9px;letter-spacing:1px">MOTIVATION</b><br>${esc(row.motivation).replace(/\n/g,'<br>')}</div>`:''}
      </div>
    </div>`;
  $('list').appendChild(wrap);
  const inputs=wrap.querySelectorAll('input[data-f]');
  function get(f){const e=wrap.querySelector('input[data-f="'+f+'"]');return e?e.value:'';}
  let mounted=false;
  function mountPreview(){mountPostCard($('prev-'+row.id),D,row.photo_url||'');mounted=true;}
  inputs.forEach(inp=>inp.addEventListener('input',()=>{if(mounted)mountPostCard($('prev-'+row.id),{first:get('first_name'),last:get('last_name'),alias:get('alias'),city:get('city'),nationality:get('nationality'),style:get('driving_style'),overall:row.overall,level:row.level,showName:row.show_name!==false},row.photo_url||'');}));
  wrap.querySelector('[data-act="save"]').onclick=async()=>{const fields={};inputs.forEach(i=>fields[i.dataset.f]=i.value);const r=await upd(row.id,fields);if(r&&r.error){alert(r.error);return;}alert('Modifications enregistrées.');};
  wrap.querySelector('[data-act="hide"]').onclick=async()=>{await upd(row.id,{hidden:!row.hidden});load();};
  const vb=wrap.querySelector('[data-act="valider"]');if(vb)vb.onclick=async()=>{const r=await upd(row.id,{status:'published'});if(r&&r.error){alert(r.error);return;}load();};
  const dlc=wrap.querySelector('[data-act="dl-card"]');
  if(dlc)dlc.onclick=async()=>{
    const old=dlc.textContent;dlc.disabled=true;dlc.textContent='…';
    try{
      const Dnow={first:get('first_name'),last:get('last_name'),alias:get('alias'),city:get('city'),nationality:get('nationality'),style:get('driving_style'),overall:row.overall,level:row.level,showName:row.show_name!==false};
      const cv=await renderCardCanvas(Dnow,row.photo_url||'');
      const blob=await new Promise(res=>cv.toBlob(res,'image/png'));
      dlBlob(blob,(row.slug||'carte')+'.png');
    }catch(e){alert('Erreur lors de la génération de la carte.');}
    dlc.textContent=old;dlc.disabled=false;
  };
  const det=wrap.querySelector('.details');
  wrap.querySelector('[data-act="more"]').onclick=function(){const open=det.classList.toggle('open');this.innerHTML=open?'Moins ▴':'Plus d\'infos ▾';if(open&&!mounted)mountPreview();};
  const delb=wrap.querySelector('[data-act="del"]');
  if(delb)delb.onclick=async()=>{
    if(!confirm('⚠ SUPPRESSION DÉFINITIVE — IRRÉVERSIBLE\n\nSupprimer définitivement le pilote « '+(row.alias||row.slug||'')+' » ?\nLa ligne Supabase ainsi que sa photo et sa carte seront effacées.'))return;
    delb.disabled=true;delb.textContent='…';
    const r=await delDrivers([{id:row.id,photo_url:row.photo_url||'',card_url:row.card_url||''}]);
    if(r&&r.error){alert(r.error);delb.disabled=false;delb.textContent='🗑 SUPPRIMER';return;}
    load();
  };
  wrap.querySelector('.sel').addEventListener('change',updateSel);
}
async function upd(id,fields){const r=await fetch('/api/admin-update',{method:'POST',headers:{'x-admin-pass':PASS,'Content-Type':'application/json'},body:JSON.stringify({id,fields})});try{return await r.json();}catch(e){return {error:'Erreur serveur'};}}
async function delDrivers(items){const r=await fetch('/api/admin-delete',{method:'POST',headers:{'x-admin-pass':PASS,'Content-Type':'application/json'},body:JSON.stringify({items})});try{return await r.json();}catch(e){return {error:'Erreur serveur'};}}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}

function selected(){return [...document.querySelectorAll('.sel:checked')];}
function updateSel(){const n=selected().length;$('selCount').textContent=n+' sélectionnée(s)';$('dlZip').disabled=n===0;$('delSel').disabled=n===0;}
$('selAll').addEventListener('change',e=>{document.querySelectorAll('.sel').forEach(c=>c.checked=e.target.checked);updateSel();});

$('delSel').onclick=async()=>{
  const sel=selected();if(!sel.length)return;
  const items=sel.map(c=>({id:c.dataset.id,photo_url:c.dataset.photo||'',card_url:c.dataset.card||''})).filter(x=>x.id);
  if(!items.length)return;
  if(!confirm('⚠ SUPPRESSION DÉFINITIVE — IRRÉVERSIBLE\n\nSupprimer définitivement '+items.length+' pilote(s) sélectionné(s) ?\nLes lignes Supabase ainsi que leurs photos et cartes seront effacées.'))return;
  $('delSel').disabled=true;$('delSel').textContent='Suppression…';
  const r=await delDrivers(items);
  if(r&&r.error){alert(r.error);}
  else if(r&&Array.isArray(r.errors)&&r.errors.length){alert('Supprimé(s) : '+r.deleted+'/'+r.total+'. Erreur(s) : '+r.errors.length+'\n'+r.errors.slice(0,3).join('\n'));}
  $('delSel').textContent='🗑 SUPPRIMER LA SÉLECTION';
  load();
};

$('dlZip').onclick=async()=>{
  const sel=selected();if(!sel.length)return;
  const wantCards=$('optCards').checked,wantPhotos=$('optPhotos').checked,wantData=$('optData').checked;
  if(!wantCards&&!wantPhotos&&!wantData){alert('Choisis au moins : Cartes, Photos ou Données.');return;}
  $('dlZip').disabled=true;$('zipState').textContent='Préparation…';
  const rowsSel=sel.map(c=>ROWS.find(r=>r.slug===c.dataset.slug)).filter(Boolean);

  // CSV seul -> téléchargement direct
  if(wantData&&!wantCards&&!wantPhotos){
    dlBlob(csvBlob(rowsSel),'candidatures.csv');
    $('zipState').textContent=rowsSel.length+' ligne(s) exportée(s).';$('dlZip').disabled=false;return;
  }
  const zip=new JSZip();let okc=0,i=0;
  for(const r of rowsSel){
    i++;
    const slug=r.slug||'pilote';
    $('zipState').textContent='Génération '+i+'/'+rowsSel.length+'…';
    if(wantCards){
      try{
        const D={first:r.first_name,last:r.last_name,alias:r.alias,city:r.city,nationality:r.nationality,style:r.driving_style,overall:r.overall,level:r.level,showName:r.show_name!==false};
        const cv=await renderCardCanvas(D,r.photo_url||'');
        const blob=await new Promise(res=>cv.toBlob(res,'image/png'));
        if(blob){zip.file(slug+'/carte.png',blob);okc++;}
      }catch(e){}
    }
    if(wantPhotos&&r.photo_url){try{const b=await (await fetch(r.photo_url,{mode:'cors'})).blob();const ext=(r.photo_url.split('.').pop()||'jpg').split('?')[0];zip.file(slug+'/photo.'+ext,b);}catch(e){}}
  }
  if(wantData) zip.file('candidatures.csv',csvBlob(rowsSel));
  const out=await zip.generateAsync({type:'blob'});
  dlBlob(out,'the-ring-selection.zip');
  $('zipState').textContent='Téléchargé ('+okc+' carte(s)).';$('dlZip').disabled=false;
};
function dlBlob(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),4000);}
function csvBlob(rows){
  const eqL=e=>e==='achat'?'Achat':(e==='location'?'Location':'');
  const cols=['Pseudo','Prénom','Nom','Âge','Ville','Nationalité','Style de conduite','Email','Formule','Statut','Masquée','Lien public','Date'];
  const q=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
  const lines=[cols.join(';')];
  rows.forEach(r=>{
    const link=location.origin+'/drivers/'+(r.slug||'');
    lines.push([r.alias,r.first_name,r.last_name,r.age,r.city,r.nationality,r.driving_style,r.email,eqL(r.equipment),r.status,(r.hidden?'oui':'non'),link,(r.created_at||'').slice(0,19).replace('T',' ')].map(q).join(';'));
  });
  return new Blob(['\uFEFF'+lines.join('\r\n')],{type:'text/csv;charset=utf-8'});
}
</script></body></html>
